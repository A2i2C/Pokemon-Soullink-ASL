<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>SoulLink Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .form-box { background: #2a2a2a; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #444; }
        input { padding: 8px; margin: 5px; border-radius: 4px; border: none; width: 80%; background: #444; color: white; }
        button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .pair { display: flex; justify-content: space-between; align-items: center; padding: 15px; margin: 10px; border-radius: 8px; background: #333; border-left: 5px solid #4CAF50; text-align: left; }
        .dead { border-left-color: #f44336; opacity: 0.5; text-decoration: line-through; }
        .route-name { font-weight: bold; color: #aaa; font-size: 0.8em; display: block; }
        .death-btn { background: #f44336; padding: 5px 10px; font-size: 0.7em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ SoulLink Tracker ⚔️</h1>
        <div class="form-box">
            <input type="text" id="routeInput" placeholder="Route"><br>
            <input type="text" id="svenInput" placeholder="Svens Pokémon"><br>
            <input type="text" id="azizInput" placeholder="Aziz' Pokémon"><br>
            <input type="text" id="luigiInput" placeholder="Luigis Pokémon"><br>
            <button onclick="addPokemon()">Hinzufügen</button>
        </div>
        <div id="tracker">Lade Daten...</div>
    </div>

    <script>
        // HIER DEINE DATEN EINTRAGEN
        const SUPABASE_URL = 'https://sbteykcuvbjlcghbtcqt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_pYVsZk-cxgbJJPVvmi7Szg_vgQfNNHj';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadData() {
            const { data, error } = await supabase.from('pokemon').select('*').order('created_at', { ascending: false });
            if (error) return console.error(error);
            const container = document.getElementById('tracker');
            container.innerHTML = '';
            data.forEach(pair => {
                const div = document.createElement('div');
                div.className = `pair ${pair.status === 'dead' ? 'dead' : ''}`;
                div.innerHTML = `
                    <div>
                        <span class="route-name">${pair.route}</span>
                        <strong>${pair.sven}</strong> & <strong>${pair.aziz}</strong> & <strong>${pair.luigi}</strong>
                    </div>
                    ${pair.status === 'alive' ? `<button class="death-btn" onclick="markAsDead(${pair.id})">TOT</button>` : ''}
                `;
                container.appendChild(div);
            });
        }

        async function addPokemon() {
            const entry = {
                route: document.getElementById('routeInput').value,
                sven: document.getElementById('svenInput').value,
                aziz: document.getElementById('azizInput').value,
                luigi: document.getElementById('luigiInput').value,
                status: 'alive'
            };
            await supabase.from('pokemon').insert([entry]);
            location.reload();
        }

        async function markAsDead(id) {
            if(confirm("Sicher? 💀")) {
                await supabase.from('pokemon').update({ status: 'dead' }).eq('id', id);
                location.reload();
            }
        }
        loadData();
    </script>
</body>
</html>

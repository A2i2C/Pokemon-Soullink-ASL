<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>SoulLink Tracker V2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .route-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr; /* 5 Spalten */
            gap: 10px; background: #2a2a2a; padding: 15px; margin-bottom: 10px; border-radius: 8px;
            align-items: center; border-left: 5px solid #4CAF50;
        }
        .dead { border-left-color: #f44336; opacity: 0.6; }
        input { padding: 8px; border-radius: 4px; border: 1px solid #444; background: #333; color: white; }
        button { cursor: pointer; padding: 8px; border: none; border-radius: 4px; }
        .btn-add { background: #4CAF50; color: white; margin-bottom: 20px; padding: 10px 20px; }
        .btn-update { background: #2196F3; color: white; font-size: 0.8em; }
        .btn-death { background: #f44336; color: white; grid-column: span 5; margin-top: 5px; }
        .header-row { font-weight: bold; color: #aaa; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ SoulLink: Route Tracker ⚔️</h1>

        <div style="margin-bottom: 30px;">
            <input type="text" id="newRouteName" placeholder="Routen Name (z.B. Route 101)">
            <button class="btn-add" id="addRouteBtn">Neue Route hinzufügen</button>
        </div>

        <div class="route-grid header-row" style="background: transparent; border: none;">
            <div>Route</div><div>Sven</div><div>Aziz</div><div>Luigi</div><div>Aktion</div>
        </div>

        <div id="trackerList">Lade Routen...</div>
    </div>

    <script>
        // --- KONFIGURATION ---
        const SUPABASE_URL = 'https://sbteykcuvbjlcghbtcqt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_pYVsZk-cxgbJJPVvmi7Szg_vgQfNNHj';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- FUNKTIONEN ---

        async function loadRoutes() {
            const { data, error } = await _supabase
                .from('Pokemon')
                .select('*');

            if (error) { console.error(error); return; }

            const list = document.getElementById('trackerList');
            list.innerHTML = '';

            data.forEach(row => {
                const div = document.createElement('div');
                div.className = `route-grid ${row.status === 'dead' ? 'dead' : ''}`;
                
                div.innerHTML = `
                    <div style="font-weight:bold">${row.route}</div>
                    <div>${row.sven || '---'} <br> <button class="btn-update" onclick="updatePoke('${row.id}', 'sven')">✍️</button></div>
                    <div>${row.aziz || '---'} <br> <button class="btn-update" onclick="updatePoke('${row.id}', 'aziz')">✍️</button></div>
                    <div>${row.luigi || '---'} <br> <button class="btn-update" onclick="updatePoke('${row.id}', 'luigi')">✍️</button></div>
                    <div>
                        <button class="btn-death" onclick="toggleStatus('${row.id}', '${row.status}')">
                            ${row.status === 'alive' ? 'MARK DEAD 💀' : 'REVIVE 😇'}
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function createRoute() {
            const name = document.getElementById('newRouteName').value;
            if(!name) return alert("Namen eingeben!");

            const { error } = await _supabase
                .from('Pokemon')
                .insert([{ route: name, sven: '---', aziz: '---', luigi: '---', status: 'alive' }]);

            if (error) alert(error.message);
            else {
                document.getElementById('newRouteName').value = '';
                loadRoutes();
            }
        }

        async function updatePoke(id, player) {
            const newPoke = prompt(`Welches Pokémon hat ${player} gefangen?`);
            if (newPoke === null) return;

            const updateData = {};
            updateData[player] = newPoke;

            const { error } = await _supabase
                .from('Pokemon')
                .update(updateData)
                .eq('id', id);

            if (error) alert(error.message);
            else loadRoutes();
        }

        async function toggleStatus(id, currentStatus) {
            const newStatus = currentStatus === 'alive' ? 'dead' : 'alive';
            const { error } = await _supabase
                .from('Pokemon')
                .update({ status: newStatus })
                .eq('id', id);

            if (error) alert(error.message);
            else loadRoutes();
        }

        // --- EVENT LISTENER ---
        document.getElementById('addRouteBtn').addEventListener('click', createRoute);

        // Start
        loadRoutes();
    </script>
</body>
</html>
